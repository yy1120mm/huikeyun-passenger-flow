# ============================================================================
# 汇客云（汇纳科技）标准客流 V4/V5 接口 —— Skill 配置文件
# ----------------------------------------------------------------------------
# 接口：阿里云 API 网关摘要签名（AppKey + AppSecret + HmacSHA256 + Content-MD5）
# 项目配置（可自行增删）
# ----------------------------------------------------------------------------
# 使用前请设置环境变量，见下方 auth 段注释。
# ============================================================================

base_url: "http://api.winneryun.com"

# ---------------------------------------------------------------------------
# 鉴权
# ---------------------------------------------------------------------------
auth:
  type: aliyun_signature
  app_key: "${ENV:HUIKEYUN_APP_KEY}"
  app_secret: "${ENV:HUIKEYUN_APP_SECRET}"
  signature_method: "HmacSHA256"
  signed_headers:
    - x-ca-key
    - x-ca-nonce
    - x-ca-signature-method
    - x-ca-timestamp

# ---------------------------------------------------------------------------
# 端点
# ---------------------------------------------------------------------------
endpoints:
  # 1. 获取场所列表
  sites:
    path: "/huikeapi/passengerFlowData/V4/getSiteKeysByCid"
    method: POST
    params:
      customer_id: "customerId"
      site_key: "siteKey"
      site_type: "siteType"
    defaults:
      customer_id: "${ENV:HUIKEYUN_CUSTOMER_ID}"
      site_type: "500"
    date_format: "%Y-%m-%d"
    pagination:
      type: none
    field_map:
      list_path: "data"

  # 2. 进出客流（按 modifyTime 增量获取）
  traffic:
    path: "/huikeapi/passengerFlowData/V4/getDataByModifyTime"
    method: POST
    params:
      customer_id: "customerId"
      site_key: "siteKey"
      modify_time: "modifyTime"
      interval: "interval"
    defaults:
      customer_id: "${ENV:HUIKEYUN_CUSTOMER_ID}"
      interval: "D"
    required_params: ["site_key", "modify_time"]
    date_format: "%Y-%m-%d %H:%M:%S"
    pagination:
      type: none

  # 3. 进出客流（按日期范围查询）
  traffic_range:
    path: "/huikeapi/passengerFlowData/V4/getDataByDataRange"
    method: POST
    params:
      customer_id: "customerId"
      site_key: "siteKey"
      begin_time: "beginTime"
      end_time: "endTime"
      interval: "interval"
    defaults:
      customer_id: "${ENV:HUIKEYUN_CUSTOMER_ID}"
      interval: "D"
    required_params: ["site_key", "begin_time", "end_time"]
    date_format: "%Y-%m-%d"
    pagination:
      type: none

  # 4. 过店客流（店铺级，默认小时粒度）
  through_traffic:
    path: "/huikeapi/passengerFlowData/V5/getDataByThroughDataRange"
    method: POST
    params:
      customer_id: "customerId"
      site_key: "siteKey"
      site_type: "siteType"
      begin_time: "beginTime"
      end_time: "endTime"
      interval: "interval"
      cursor: "cursor"
    defaults:
      customer_id: "${ENV:HUIKEYUN_CUSTOMER_ID}"
      site_type: "600"
      interval: "H"
      cursor: ""
    required_params: ["site_key", "begin_time", "end_time"]
    date_format: "%Y-%m-%d %H:%M:%S"
    pagination:
      type: cursor
      cursor_param: "cursor"
      has_next_field: "hasNext"
      next_cursor_field: "nextCursor"
    field_map:
      list_path: "data.list"
      record_map:
        project:    "siteKey"
        project_id: "siteKey"
        date:       "dataTime"
        hour:       "dataTime"
      metric_map:
        through_num: "throughNum"

# ---------------------------------------------------------------------------
# 指标注册表
# ---------------------------------------------------------------------------
metrics:
  in_num:       { label: "进场人数", unit: "人次" }
  out_num:      { label: "出场人数", unit: "人次" }
  net_flow:     { label: "净流量",   unit: "人次" }
  through_num:  { label: "过店客流", unit: "人次" }

# ---------------------------------------------------------------------------
# 字段映射
# ---------------------------------------------------------------------------
field_map:
  list_path: "data"
  record_map:
    project:    "siteKey"
    project_id: "siteKey"
    date:       "dataTime"
    hour:       null
  metric_map:
    in_num:  "inNum"
    out_num: "outNum"

# ---------------------------------------------------------------------------
# 已知项目清单
# ---------------------------------------------------------------------------
projects:
  - { id: "ADE48DC2665CF6FBD1A2043DC49FC95F", name: "默认项目" }
